<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webáruház</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <header class="mb-4">
            <h1 class="text-center">Webáruház</h1>
        </header>

        <div class="row mb-4">
            <div class="col-md-6 mb-2">
                <div class="input-group">
                    <input type="text" id="keresoMezo" class="form-control"
                           placeholder="Keresés terméknév szerint">
                    <button id="keresoGomb" class="btn btn-primary">Keres</button>
                </div>
            </div>
            <div class="col-md-6 mb-2">
                <select id="szuroSelect" class="form-select">
                    <option value="all">Összes termék</option>
                    <option value="electronics">Elektronika</option>
                    <option value="clothing">Ruha</option>
                    <option value="home">Háztartás</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <h2>Terméklista</h2>
                <div id="termekLista" class="row"></div>
            </div>

            <div class="col-md-4">
                <h2>Kosár</h2>
                <div class="border rounded bg-white p-3 sticky-top" style="top: 1rem;">
                    <div id="kosarItems">
                        <p class="text-center mb-0">A kosár üres</p>
                    </div>
                    <hr>
                    <h4 class="mb-0">Összesen: <span id="osszesen">0</span> Ft</h4>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="index.js"></script>
</body>
</html>
