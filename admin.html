<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Webáruház</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <header class="mb-4 d-flex justify-content-between align-items-center">
        <h1>Admin - Terméklista kezelés</h1>
        <a href="index.html" class="btn btn-outline-primary"
          >Vissza a webáruházba</a
        >
      </header>

      <div class="row">
        <div class="col-md-4 mb-4">
          <div class="card">
            <div class="card-body">
              <h4 class="card-title mb-3">Új termék</h4>
              <form id="ujTermekForm">
                <div class="mb-3">
                  <label class="form-label">Név</label>
                  <input
                    type="text"
                    id="nevMezo"
                    class="form-control"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Ár (Ft)</label>
                  <input
                    type="number"
                    id="arMezo"
                    class="form-control"
                    min="1"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Kategória</label>
                  <select id="kategoriaSelect" class="form-select">
                    <option value="electronics">Elektronika</option>
                    <option value="clothing">Ruha</option>
                    <option value="home">Háztartás</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label">Leírás</label>
                  <textarea
                    id="leirasMezo"
                    class="form-control"
                    rows="3"
                    required
                  ></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label">Kép (opcionális)</label>
                  <input
                    type="file"
                    id="kepMezo"
                    class="form-control"
                    accept="image/*"
                  />
                  <div id="kepElonezet"></div>
                </div>
                <button type="submit" class="btn btn-success w-100">
                  Hozzáadás
                </button>
              </form>
              <hr />
              <button id="resetGomb" class="btn btn-outline-danger w-100">
                Alapértelmezett lista visszaállítása
              </button>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <h4>Összes termék</h4>
          <div class="table-responsive bg-white rounded border">
            <table class="table table-striped mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Kép</th>
                  <th>Név</th>
                  <th>Ár</th>
                  <th>Kategória</th>
                  <th>Leírás</th>
                  <th>Művelet</th>
                </tr>
              </thead>
              <tbody id="termekTabla"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="admin.js"></script>
  </body>
</html>
